<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>STI Enrollment Form</title>

</head>
<body>
    <div class="container">

        <form>
          <h1>Enrollment form</h1>
            <label for="firstName">First name:</label><br>
            <input type="text" id="firstName" name="firstName"><br>
            <label for="middleName">Middle name:</label><br>
            <input type="text" id="middleName" name="middleName"><br>
            <label for="lastName">Last name:</label><br>
            <input type="text" id="lastName" name="lastName"><br>
            <label for="address">Address:</label><br>
            <input type="text" id="address" name="address"><br>
            <label for="mail">Mail:</label><br>
            <input type="text" id="mail" name="mail">

            <p>Select an option:</p>

            <input type="radio" id="bsit" name="course" value="BSIT">
            <label for="bsit">BSIT</label><br>
            <input type="radio" id="bshm" name="course" value="BSHM">
            <label for="bshm">BSHM</label><br>
            <input type="radio" id="bstm" name="course" value="BSTM">
            <label for="bstm">BSTM</label><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>
    </div>
</body>
</html>
